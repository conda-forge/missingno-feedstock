{% set version = "0.5.2" %}

package:
  name: missingno
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/missingno/missingno-{{ version }}.tar.gz
  sha256: 4a4baa9ca9f9e4e0d9402455df26b656632e94b99e87fa64c0cdbbbc722837ac

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - pandas
    - matplotlib-base
    - seaborn

test:
  requires:
    - python {{ python_min }}
  imports:
    - missingno

about:
  home: https://github.com/ResidentMario/missingno
  license: MIT
  license_family: MIT
  license_file: {{ environ["RECIPE_DIR"] }}/LICENSE
  summary: Missing data visualization module for Python.

extra:
  recipe-maintainers:
    - vasudevanv
    - ericmjl
